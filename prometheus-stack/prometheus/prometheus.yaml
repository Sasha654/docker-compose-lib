global:
  scrape_interval: "15s"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node-exporter
    scrape_interval: 5s
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: docker-app
    static_configs:
      - targets:
        - host.docker.internal:5000

rule_files:
  - "alertrules.yaml"

alerting:
  alertmanagers:
  - scheme: http
    static_configs:
    - targets:
      - "alertmanager:9093"